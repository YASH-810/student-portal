<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=account_circle"
    />
</head>
<body>
   <div class="navbar">
        <h1>Welcome {UserName}</h1>
        <div class="profile-menu">
          <span class="material-symbols-outlined profile-icon" onclick="toggleProfileMenu(event)"> account_circle </span>
          <div class="profile-dropdown">
            <a href="#">
              Forgot Password
            </a>
            <div class="dropdown-divider"></div>
            <a href="/index.html">
              Logout
            </a>
          </div>
        </div>
      </div>
    <script>
      function toggleProfileMenu(event) {
        event.stopPropagation();
        document.querySelector('.profile-dropdown').classList.toggle('show');
      }

      window.onclick = function(event) {
        const dropdown = document.querySelector('.profile-dropdown');
        if (dropdown && dropdown.classList.contains('show')) {
          dropdown.classList.remove('show');
        }
      }
    </script>
</body>
</html>
